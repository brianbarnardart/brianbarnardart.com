<footer class="site-footer h-card">
  <data class="u-url" href="/"></data>

  <div class="wrapper">
    <div class="footer-col-wrapper">

      <div class="footer-col footer-col-1">
        <ul class="contact-list">
          <li class="p-name">{{ site.author }}</li>
          <li><span class="p-note">{{ site.description }}</span></li>
        </ul>
      </div>

      <div class="footer-col footer-col-2">
        <ul class="social-media-list">
          <li><a href="https://www.youtube.com/@brianbarnardart" target="_blank" rel="noopener" title="YouTube">{% include icons/youtube.svg %} YouTube</a></li>
          <li><a href="https://www.instagram.com/brianbarnardart/" target="_blank" rel="noopener" title="Instagram">{% include icons/instagram.svg %} Instagram</a></li>
          <li><a href="https://www.facebook.com/brianbarnardart/" target="_blank" rel="noopener" title="Facebook">{% include icons/facebook.svg %} Facebook</a></li>
          <li><a href="https://www.linkedin.com/in/brian-barnard-60b7b543" target="_blank" rel="noopener" title="LinkedIn">{% include icons/linkedin.svg %} LinkedIn</a></li>
        </ul>
      </div>

      <div class="footer-col footer-col-3">
        <p>&copy; {{ 'now' | date: "%Y" }}, All Art Rights Reserved</p>
      </div>

    </div>
  </div>
</footer>
