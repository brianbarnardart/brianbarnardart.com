<form {% if include.id %}id="{{ include.id }}"{% endif %} action="https://submit-form.com/AvqUDoWyl" method="POST" class="contact-form" novalidate>
  {% if include.is_inquiry %}
  <!-- These hidden fields tell Brian which painting the inquiry is about -->
  <input type="hidden" name="painting" value="{{ page.title }}">
  <input type="hidden" name="page_url" value="{{ page.url | absolute_url }}">
  {% endif %}

  <div class="form-field">
    <label for="form-name-{{ include.id }}">Name</label>
    <input type="text" id="form-name-{{ include.id }}" name="name" placeholder="Your name" required>
  </div>
  <div class="form-field">
    <label for="form-email-{{ include.id }}">Email</label>
    <input type="email" id="form-email-{{ include.id }}" name="email" placeholder="your@email.com">
  </div>
  <div class="form-field">
    <label for="form-phone-{{ include.id }}">Phone <span class="optional">(optional)</span></label>
    <input type="tel" id="form-phone-{{ include.id }}" name="phone" placeholder="(555) 555-5555">
  </div>
  <div class="form-field">
    <label for="form-message-{{ include.id }}">Message{% unless include.is_inquiry %} <span class="optional">(required)</span>{% else %} <span class="optional">(optional)</span>{% endunless %}</label>
    <textarea id="form-message-{{ include.id }}" name="message" placeholder="{{ include.message_placeholder | default: 'Message' }}" {% unless include.is_inquiry %}required{% endunless %}></textarea>
  </div>
  <button type="submit" class="form-submit">{{ include.submit_text | default: 'Send' }}</button>
  <p class="form-status" aria-live="polite"></p>
</form>

<script>
(function () {
  var formId = "{{ include.id | default: 'contact-form' }}";
  var form = document.getElementById(formId);
  if (!form) return;

  var textarea = form.querySelector('textarea[name="message"]');
  if (textarea) {
    textarea.addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = this.scrollHeight + 'px';
    });
  }

  var status = form.querySelector('.form-status');

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    if (!form.checkValidity()) { form.reportValidity(); return; }

    var btn = form.querySelector('button[type="submit"]');
    var originalBtnText = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Sending…';
    status.textContent = '';
    status.className = 'form-status';

    fetch(form.action, {
      method: 'POST',
      body: JSON.stringify(Object.fromEntries(new FormData(form))),
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      }
    })
    .then(function (res) {
      if (res.ok) {
        form.reset();
        if (textarea) textarea.style.height = '';
        status.textContent = `{{ include.success_message | default: 'Message sent — thank you! Brian will be in touch soon.' }}`;
        status.classList.add('form-status--ok');
      } else {
        return res.json().then(function(data) {
           throw new Error(data.message || 'server error');
        });
      }
    })
    .catch(function (error) {
      console.error(error);
      status.textContent = 'Something went wrong. Please try again or contact Brian directly.';
      status.classList.add('form-status--err');
    })
    .finally(function () {
      btn.disabled = false;
      btn.textContent = originalBtnText;
    });
  });
}());
</script>
