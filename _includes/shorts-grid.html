{% if site.data.shorts %}
<section class="shorts-section">
  <div class="shorts-grid">
    {% for short in site.data.shorts %}
    <div class="short-card">
      <div class="short-frame">
        <iframe
          src="https://www.youtube.com/embed/{{ short.id }}?rel=0"
          title="{{ short.title | markdownify | strip_html | strip_newlines | strip }}"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen
          loading="lazy">
        </iframe>
      </div>
      <p class="short-caption">{{ short.title | markdownify | remove: "<p>" | remove: "</p>" | strip_newlines }}</p>
    </div>
    {% endfor %}
  </div>
  <p class="channel-link">
    <a href="https://www.youtube.com/@brianbarnardart">▶ See all videos on YouTube</a>
    &nbsp;&nbsp;
    <a href="https://www.instagram.com/brianbarnardart/">📷 Follow on Instagram</a>
  </p>
</section>
{% endif %}
