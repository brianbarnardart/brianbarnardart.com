<section class="artwork-inquiry">
  <h2>Interested in this piece?</h2>
  <p>Leave your details and Brian will get back to you.</p>

  <form id="inquiry-form" action="https://api.formspark.io/AvqUDoWyl" method="POST" class="contact-form" novalidate>
    <!-- These hidden fields tell Brian which painting the inquiry is about -->
    <input type="hidden" name="painting" value="{{ page.title }}">
    <input type="hidden" name="page_url" value="{{ page.url | absolute_url }}">

    <div class="form-field">
      <label for="inq-name">Name</label>
      <input type="text" id="inq-name" name="name" placeholder="Your name" required>
    </div>
    <div class="form-field">
      <label for="inq-email">Email</label>
      <input type="email" id="inq-email" name="email" placeholder="your@email.com">
    </div>
    <div class="form-field">
      <label for="inq-phone">Phone <span class="optional">(optional)</span></label>
      <input type="tel" id="inq-phone" name="phone" placeholder="(555) 555-5555">
    </div>
    <div class="form-field">
      <label for="inq-message">Message <span class="optional">(optional)</span></label>
      <textarea id="inq-message" name="message" placeholder="Any questions about the piece?"></textarea>
    </div>
    <button type="submit" class="form-submit">Send Enquiry</button>
    <p id="inquiry-status" class="form-status" aria-live="polite"></p>
  </form>
</section>

<script>
(function () {
  var textarea = document.getElementById('inq-message');
  if (textarea) {
    textarea.addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = this.scrollHeight + 'px';
    });
  }

  var form   = document.getElementById('inquiry-form');
  var status = document.getElementById('inquiry-status');
  if (!form) return;

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    if (!form.checkValidity()) { form.reportValidity(); return; }

    var btn = form.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Sending…';
    status.textContent = '';
    status.className = 'form-status';

    fetch(form.action, {
      method: 'POST',
      body: new FormData(form),
      headers: { 'Accept': 'application/json' }
    })
    .then(function (res) {
      if (res.ok) {
        form.reset();
        if (textarea) textarea.style.height = '';
        status.textContent = 'Enquiry sent — Brian will be in touch soon!';
        status.classList.add('form-status--ok');
      } else {
        throw new Error();
      }
    })
    .catch(function () {
      status.textContent = 'Something went wrong. Please try reaching Brian on Facebook.';
      status.classList.add('form-status--err');
    })
    .finally(function () {
      btn.disabled = false;
      btn.textContent = 'Send Enquiry';
    });
  });
}());
</script>
