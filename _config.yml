title: Brian Barnard Art
description: Fernandina Beach Artist
url: "https://brianbarnardart.com"
baseurl: ""

# Author info used by the minima theme
author: Brian Barnard

theme: minima

# Plugins loaded from Gemfile
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Jekyll build settings
markdown: kramdown
permalink: pretty

# Collections — each file in _<name>/ becomes a page
collections:
  artworks:
    output: true
    permalink: /artworks/:name/
  venues:
    output: true
    permalink: /venues/:name/
  events:
    output: true
    permalink: /events/:name/
  bands:
    output: true
    permalink: /bands/:name/
  interests:
    output: true
    permalink: /interests/:name/
  charities:
    output: true
    permalink: /charities/:name/
  characters:
    output: true
    permalink: /characters/:name/

# These files/dirs are excluded from the Jekyll build output
exclude:
  - README.md
  - LICENSE
